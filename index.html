<div class="avatar-container">
    <div class="avatar">
        <!-- Avatar Background Glow -->
        <div class="avatar-glow"></div>
        
        <!-- Avatar Hair -->
        <div class="avatar-hair"></div>
        
        <!-- Avatar Head -->
        <div class="avatar-head">
            <!-- Left Eye -->
            <div class="avatar-eye left">
                <div class="eye-white">
                    <div class="eye-pupil"></div>
                </div>
            </div>
            
            <!-- Right Eye -->
            <div class="avatar-eye right">
                <div class="eye-white">
                    <div class="eye-pupil"></div>
                </div>
            </div>
            
            <!-- Eyebrows -->
            <div class="avatar-eyebrow left"></div>
            <div class="avatar-eyebrow right"></div>
            
            <!-- Nose -->
            <div class="avatar-nose"></div>
            
            <!-- Mouth -->
            <div class="avatar-mouth">
                <div class="mouth-top"></div>
                <div class="mouth-bottom"></div>
            </div>
        </div>
        
        <!-- Avatar Neck -->
        <div class="avatar-neck"></div>
        
        <!-- Avatar Body/Torso -->
        <div class="avatar-body">
            <!-- Left Shoulder -->
            <div class="avatar-shoulder left"></div>
            
            <!-- Right Shoulder -->
            <div class="avatar-shoulder right"></div>
        </div>
        
        <!-- Left Arm -->
        <div class="avatar-arm left">
            <div class="upper-arm"></div>
            <div class="forearm"></div>
            <div class="hand">
                <div class="palm"></div>
                <div class="thumb"></div>
                <div class="fingers"></div>
            </div>
        </div>
        
        <!-- Right Arm -->
        <div class="avatar-arm right">
            <div class="upper-arm"></div>
            <div class="forearm"></div>
            <div class="hand">
                <div class="palm"></div>
                <div class="thumb"></div>
                <div class="fingers"></div>
            </div>
        </div>
    </div>
</div>
